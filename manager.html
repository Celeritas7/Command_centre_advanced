<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CC Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--card:#161616;--card2:#1c1c1c;--amber:#d48900;--amber2:#b37300;--amberBg:rgba(212,137,0,.08);--amberBd:rgba(212,137,0,.15);--text:#e8e0d4;--text2:#888;--text3:#555;--red:#e24b4a;--green:#38a169;--blue:#4a9eff;--purple:#7f77dd;--teal:#1d9e75;--atkC:#e2722a;--midC:#3b82f6;--defC:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* Sidebar */
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--amberBd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sb-hdr{padding:16px;border-bottom:1px solid var(--amberBd)}
.sb-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--amber)}
.sb-sub{font-size:9px;color:var(--text2);margin-top:2px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-item:hover{background:var(--amberBg);color:var(--text)}
.sb-item.active{background:var(--amber);color:var(--bg);font-weight:700}
.sb-item .ico{font-size:16px;min-width:20px;text-align:center}
.sb-item .badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700}
.sb-foot{padding:12px;border-top:1px solid var(--amberBd)}
.sb-foot a{color:var(--amber);font-size:10px;text-decoration:none;display:flex;align-items:center;gap:6px}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh;padding:24px 28px}
.page-hdr{margin-bottom:20px}
.page-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700}
.page-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* Cards */
.mgr-card{background:var(--card);border:1px solid var(--amberBd);border-radius:12px;padding:16px;margin-bottom:12px}
.mgr-card-hd{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mgr-card-sub{font-size:10px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.mgr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mgr-label{font-size:10px;color:var(--text2);min-width:80px}
.mgr-sel{background:var(--card2);border:1px solid var(--amberBd);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--text);font-family:inherit;outline:none;cursor:pointer}
.mgr-inp{background:var(--card2);border:1px solid var(--amberBd);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--text);font-family:inherit;outline:none}
.mgr-toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--amberBd);background:var(--card2);color:var(--text2);font-family:inherit;transition:all .15s}
.mgr-toggle.on{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.mgr-btn{border:none;padding:6px 14px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.mgr-btn-primary{background:var(--amber);color:var(--bg)}
.mgr-btn-danger{background:rgba(226,75,74,.12);color:var(--red)}
.mgr-btn-ghost{background:none;color:var(--amber);border:1px dashed var(--amberBd)}
.mgr-btn-teal{background:var(--teal);color:var(--bg)}

/* Grid */
.mgr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.mgr-grid{grid-template-columns:1fr}}

/* Status dots */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-y{background:var(--amber)}

/* Timeline */
.tl-wrap{position:relative;overflow-x:auto;border:1px solid var(--amberBd);border-radius:10px;background:var(--card);margin-bottom:16px}
.tl-header{display:flex;position:sticky;top:0;background:var(--card);z-index:2;border-bottom:1px solid var(--amberBd)}
.tl-label-col{min-width:130px;padding:8px 10px;font-size:10px;font-weight:700;color:var(--text2)}
.tl-hours{display:flex;flex:1}
.tl-hour{min-width:46px;flex:1;text-align:center;font-size:8px;color:var(--text3);padding:6px 0;font-family:'JetBrains Mono',monospace;border-left:1px solid rgba(255,255,255,.03)}
.tl-hour.now{color:var(--amber);font-weight:700}
.tl-row{display:flex;min-height:36px;border-bottom:1px solid rgba(255,255,255,.03)}
.tl-row:last-child{border-bottom:none}
.tl-row-label{min-width:130px;display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:10px;font-weight:600;border-right:1px solid rgba(255,255,255,.05)}
.tl-row-label .type{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700}
.tl-row-label .type.atk{background:#e2722a22;color:var(--atkC)}
.tl-row-label .type.mid{background:#3b82f622;color:var(--midC)}
.tl-row-label .type.def{background:#a855f722;color:var(--defC)}
.tl-track{flex:1;position:relative;min-height:36px}
.tl-bar{position:absolute;top:4px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;min-width:20px;cursor:pointer}
.tl-bar:hover{opacity:.85}
.tl-bar.atk{background:rgba(226,114,42,.35);border:1px solid rgba(226,114,42,.5);color:#e8a060}
.tl-bar.mid{background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.4);color:#7ab0f5}
.tl-bar.def{background:rgba(168,85,247,.25);border:1px solid rgba(168,85,247,.4);color:#b890f0}
.tl-now{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:1;pointer-events:none}

/* Tier chips */
.tier-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tier-chip{display:flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--amberBd);border-radius:6px;padding:4px 8px;font-size:10px}
.tier-chip button{border:none;background:none;color:var(--text3);cursor:pointer;font-size:9px;padding:0 2px;font-family:inherit}
.tier-chip button:hover{color:var(--amber)}

/* Clash */
.clash-item{background:var(--card);border:1px solid var(--red);border-radius:10px;padding:12px;margin-bottom:8px}
.clash-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700}
.clash-badge.w{background:rgba(56,161,105,.15);color:var(--green)}
.clash-badge.l{background:rgba(226,75,74,.1);color:var(--red)}

/* Bench */
.bench-cat{background:var(--card);border:1px solid var(--amberBd);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s}
.bench-cat:hover{border-color:var(--amber)}
.bench-count{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;background:var(--amberBg);color:var(--amber)}

/* Task items */
.task-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.task-item:last-child{border-bottom:none}
.task-pri{width:3px;height:18px;border-radius:2px;flex-shrink:0}

/* Mobile */
.sb-toggle{display:none;position:fixed;top:12px;left:12px;z-index:20;background:var(--amber);color:var(--bg);border:none;width:36px;height:36px;border-radius:8px;font-size:16px;cursor:pointer;font-family:inherit}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;z-index:15}
  .sidebar.open{transform:translateX(0)}
  .sb-toggle{display:block}
  .main{margin-left:0;padding:16px;padding-top:56px}
}
</style>
</head>
<body>

<button class="sb-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<nav class="sidebar">
  <div class="sb-hdr">
    <div class="sb-title">⚡ CC Manager</div>
    <div class="sb-sub">Command Centre Control Room</div>
  </div>
  <div class="sb-nav" id="sbnav"></div>
  <div class="sb-foot"><a href="index.html">← Back to pitch</a></div>
</nav>

<div class="main" id="content">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text3)">Loading...</div>
</div>

<script>
// ===== CONFIG =====
const SB_URL='https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const sb=window.supabase.createClient(SB_URL,SB_ANON);

// ===== SQUADS =====
const SQUADS=[
  {name:'App Gen',type:'attacker',ico:'💻',locs:['home']},
  {name:'Quick Study',type:'attacker',ico:'📖',locs:['home','outside']},
  {name:'AI Study',type:'attacker',ico:'🤖',locs:['home']},
  {name:'Executive',type:'attacker',ico:'🎯',locs:['outside']},
  {name:'Manager Tasks',type:'attacker',ico:'📨',locs:['office']},
  {name:'Reminders',type:'attacker',ico:'⏰',locs:['office']},
  {name:'People Tasks',type:'attacker',ico:'👥',locs:['office']},
  {name:'Food',type:'midfielder',ico:'🍳',locs:['home','outside']},
  {name:'Cost',type:'midfielder',ico:'💰',locs:['home','outside']},
  {name:'Weather',type:'midfielder',ico:'⛅',locs:['outside']},
  {name:'Health',type:'midfielder',ico:'💊',locs:['home','outside']},
  {name:'Exercise',type:'midfielder',ico:'💪',locs:['home']},
  {name:'Eagle Eye',type:'midfielder',ico:'🦅',locs:['office']},
  {name:'Ghost Tracker',type:'midfielder',ico:'👻',locs:['office']},
  {name:'Part Inventory',type:'midfielder',ico:'🔩',locs:['office']},
  {name:'Sleep',type:'defender',ico:'😴',locs:['home']},
  {name:'Psychology',type:'defender',ico:'🧠',locs:['office','outside']},
  {name:'Fashion',type:'defender',ico:'👔',locs:['home','outside']},
  {name:'Cleaning',type:'defender',ico:'🧹',locs:['home']},
];
function findSq(n){return SQUADS.find(function(s){return s.name===n})}

// ===== STATE =====
var page='dayplans';
var takeoverConfig={},streakData={},clashPriorities={Health:4,Sleep:4,Food:3,Exercise:3,Cleaning:3,'Manager Tasks':2,Reminders:2,'People Tasks':2,Executive:2,'App Gen':2,'Quick Study':2,'AI Study':2,Cost:1,Weather:1,Fashion:1,Psychology:1,'Eagle Eye':1,'Ghost Tracker':1,'Part Inventory':1};

// Day Plans: base activity + scheduled interrupts per day type
var dayPlans={
  weekday:{
    base:'work',
    location:'office',
    interrupts:[
      {id:'wd1',time:'07:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍳',text:'Cook breakfast'},{ico:'🍱',text:'Prep lunch bento'}]},
      {id:'wd2',time:'09:00',squad:'Manager Tasks',duration:10,hardLock:false,tasks:[{ico:'📨',text:'Check inbox'},{ico:'📋',text:'Update status'}]},
      {id:'wd3',time:'12:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍱',text:'Eat lunch'},{ico:'💧',text:'Drink water'}]},
      {id:'wd4',time:'17:30',squad:'Exercise',duration:15,hardLock:false,tasks:[{ico:'💪',text:'Quick workout'},{ico:'🧘',text:'Stretch'}]},
      {id:'wd5',time:'19:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍳',text:'Cook dinner'},{ico:'🧹',text:'Clean kitchen'}]},
      {id:'wd6',time:'22:00',squad:'Sleep',duration:10,hardLock:true,tasks:[{ico:'📴',text:'Screens off'},{ico:'🪥',text:'Brush teeth'},{ico:'⏰',text:'Set alarm'}]},
    ]
  },
  weekend:{
    base:'App Gen',
    location:'home',
    interrupts:[
      {id:'we1',time:'06:00',squad:'Exercise',duration:15,hardLock:true,tasks:[{ico:'💪',text:'20 pushups'},{ico:'🦵',text:'30 squats'},{ico:'🧘',text:'Plank + stretch'}]},
      {id:'we2',time:'07:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍳',text:'Cook breakfast'},{ico:'🧊',text:'Check fridge'}]},
      {id:'we3',time:'12:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍱',text:'Cook lunch'},{ico:'💧',text:'Drink water'}]},
      {id:'we4',time:'15:00',squad:'Exercise',duration:15,hardLock:true,tasks:[{ico:'🚶',text:'Walk 15 min'},{ico:'🧘',text:'Stretch'}]},
      {id:'we5',time:'19:00',squad:'Food',duration:30,hardLock:true,tasks:[{ico:'🍳',text:'Cook dinner'},{ico:'🗑️',text:'Take out trash'}]},
      {id:'we6',time:'21:00',squad:'Cleaning',duration:15,hardLock:false,tasks:[{ico:'🧽',text:'Wipe surfaces'},{ico:'🍽️',text:'Dishes'},{ico:'🧹',text:'Sweep'}]},
      {id:'we7',time:'21:30',squad:'Cost',duration:10,hardLock:false,tasks:[{ico:'💰',text:'Log expenses'},{ico:'📊',text:'Check budget'}]},
      {id:'we8',time:'22:00',squad:'Sleep',duration:10,hardLock:true,tasks:[{ico:'📴',text:'Screens off'},{ico:'🪥',text:'Brush teeth'},{ico:'👕',text:'Prep tomorrow'}]},
    ]
  }
};
var activeDayType='weekend'; // which plan is being edited
var clashRules={weekendShieldsUp:{enabled:true,beforeHour:13,description:'Defenders/Mid before Attackers until 1 PM'},creditEmergency:{enabled:true,threshold:10,description:'Force squad if credits below threshold'},streakProtection:{enabled:true,description:'Squad with 3+ day streak gets +1 tier boost'},moodOverride:{enabled:true,description:'Emergency → Health/Psychology become captains'}};
var allTasks=[],playerMap={},timeSlotRules={},ofcBlLinks=[],ssMessages=[],ssTimeoutMin=15;
var costTriggerCfg={timeTriggers:[],gpsShops:[],gpsCooldownMin:15,officeDeparture:{enabled:true,delayMin:2}};
var gpsLat=0,gpsLng=0,gpsAccuracy=0,gpsAutoLoc=true;
var gpsZones=[];    // [{id,name,lat,lng,radius,loc_state,sort_order,...}] from command_centre_gps_locations
var gpsTriggers=[]; // [{id,name,lat,lng,radius,action,squad,start_on,time_from,time_to,days,cooldown_min,...}]
var ccApiKey='',brainSettings={},customSquads={};
var personalities={};

// ===== NAV =====
var NAV=[
  {id:'dayplans',ico:'📅',name:'Day Plans',desc:'Base activity + interrupts'},
  {id:'takeover',ico:'⚡',name:'Takeover',desc:'Timeline + squad configs'},
  {id:'brain',ico:'🧠',name:'Brain',desc:'Personalities, clash, tiers'},
  {id:'bench',ico:'📋',name:'Bench',desc:'Tasks + categories'},
  {id:'rules',ico:'📏',name:'Rules',desc:'Attacker time slots'},
  {id:'settings',ico:'⚙️',name:'Settings',desc:'Links, screensaver, triggers'},
  {id:'commute',ico:'🚃',name:'Commute',desc:'GPS + train card'},
];

function renderNav(){
  var h='';
  NAV.forEach(function(n){
    h+='<button class="sb-item '+(page===n.id?'active':'')+'" onclick="page=\''+n.id+'\';renderNav();renderPage()"><span class="ico">'+n.ico+'</span><span>'+n.name+'</span></button>';
  });
  document.getElementById('sbnav').innerHTML=h;
}

// ===== INIT =====
async function init(){
  renderNav();
  try{
    var keys=['cf_takeover_cfg','cf_streaks','cf_timeslots','cf_ofc_bl_links','cf_screensaver','cf_cost_triggers','cf_api_key','cf_custom_squads'];
    var{data:mem}=await sb.from('mind_map_app_chat_memory').select('key,value').in('key',keys);
    (mem||[]).forEach(function(m){
      try{
        if(m.key==='cf_takeover_cfg')takeoverConfig=JSON.parse(m.value);
        if(m.key==='cf_streaks')streakData=JSON.parse(m.value);
        if(m.key==='cf_timeslots')timeSlotRules=JSON.parse(m.value);
        if(m.key==='cf_ofc_bl_links')ofcBlLinks=JSON.parse(m.value);
        if(m.key==='cf_screensaver'){var d=JSON.parse(m.value);ssMessages=d.messages||[];ssTimeoutMin=d.timeout||15}
        if(m.key==='cf_cost_triggers')costTriggerCfg=JSON.parse(m.value);
        if(m.key==='cf_api_key')ccApiKey=m.value;
        if(m.key==='cf_custom_squads')customSquads=JSON.parse(m.value);
      }catch(e){}
    });
    // Load tasks + tags for bench
    var{data:tasks}=await sb.from('mind_map_app_tasks').select('id,name,status,assembly_id,parent_id,is_recurring,links,notes').neq('status','done');
    allTasks=tasks||[];
    var{data:tags}=await sb.from('mind_map_app_tags').select('id,name,type');
    var allTagsMgr=tags||[];
    var{data:ttData}=await sb.from('mind_map_app_task_tags').select('task_id,tag_id');
    var taskTagsMgr={};(ttData||[]).forEach(function(tt){if(!taskTagsMgr[tt.task_id])taskTagsMgr[tt.task_id]=[];taskTagsMgr[tt.task_id].push(tt.tag_id)});
    // Build category lookup
    var catTagMap={};allTagsMgr.filter(function(t){return t.type==='category'}).forEach(function(t){catTagMap[t.id]=t.name});
    // Attach category to each task
    allTasks.forEach(function(t){
      var tagIds=taskTagsMgr[t.id]||[];
      t._category='';
      for(var k=0;k<tagIds.length;k++){if(catTagMap[tagIds[k]]){t._category=catTagMap[tagIds[k]];break}}
    });
    // Load brain settings
    var{data:bs}=await sb.from('command_centre_brain_settings').select('key,value');
    (bs||[]).forEach(function(r){brainSettings[r.key]=r.value;if(r.key==='clash_config'){if(r.value.priorities)clashPriorities=r.value.priorities;if(r.value.rules)clashRules=r.value.rules}if(r.key==='personalities')personalities=r.value||{};if(r.key==='day_plans')dayPlans=r.value||dayPlans});
    // Load GPS locations from dedicated table
    var{data:gpsData,error:gpsErr}=await sb.from('command_centre_gps_locations').select('*').order('sort_order');
    if(gpsErr)console.error('GPS table load error:',gpsErr.message,'— did you run the SQL migration?');
    if(gpsData&&gpsData.length){
      gpsZones=gpsData.filter(function(r){return r.type==='zone'});
      gpsTriggers=gpsData.filter(function(r){return r.type==='trigger'});
      console.log('GPS locations loaded:',gpsZones.length,'zones,',gpsTriggers.length,'triggers');
    }else{
      console.log('GPS table empty or missing — checking brain_settings for old format...');
      // Auto-migrate from old brain_settings gps_locations key
      var oldLocs=brainSettings['gps_locations'];
      if(oldLocs&&typeof oldLocs==='object'){
        console.log('Found old gps_locations in brain_settings, migrating...');
        var sortOrder=0;
        for(var key in oldLocs){
          var loc=oldLocs[key];
          var locState=(key==='home'?'home':key==='office'?'office':'outside');
          var row={name:loc.name||key,lat:loc.lat,lng:loc.lng,radius:loc.radius||500,type:'zone',loc_state:locState,enabled:true,sort_order:sortOrder++};
          var{data:inserted}=await sb.from('command_centre_gps_locations').insert(row).select();
          if(inserted&&inserted[0]){gpsZones.push(inserted[0]);console.log('Migrated zone:',row.name)}
        }
        console.log('Migration complete:',gpsZones.length,'zones created');
      }
    }
    // GPS
    if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){gpsLat=p.coords.latitude;gpsLng=p.coords.longitude;gpsAccuracy=Math.round(p.coords.accuracy)},function(){},{timeout:8000});
  }catch(e){console.error('Init error:',e)}
  renderPage();
}

// ===== SAVE HELPERS =====
async function saveMem(k,v){await sb.from('mind_map_app_chat_memory').upsert({key:k,value:typeof v==='string'?v:JSON.stringify(v)},{onConflict:'key'})}
async function saveTakeover(){await saveMem('cf_takeover_cfg',takeoverConfig)}
async function saveClash(){await sb.from('command_centre_brain_settings').upsert({key:'clash_config',value:{priorities:clashPriorities,rules:clashRules}},{onConflict:'key'})}
async function savePersonalities(){await sb.from('command_centre_brain_settings').upsert({key:'personalities',value:personalities},{onConflict:'key'})}
async function saveDayPlans(){await sb.from('command_centre_brain_settings').upsert({key:'day_plans',value:dayPlans},{onConflict:'key'})}
async function saveGpsLoc(row){
  var{id,...rest}=row;rest.updated_at=new Date().toISOString();
  if(id){await sb.from('command_centre_gps_locations').update(rest).eq('id',id)}
  else{var{data}=await sb.from('command_centre_gps_locations').insert(rest).select();if(data&&data[0])return data[0]}
  return row;
}
async function deleteGpsLoc(id){await sb.from('command_centre_gps_locations').delete().eq('id',id)}
async function reloadGpsLocs(){
  var{data}=await sb.from('command_centre_gps_locations').select('*').order('sort_order');
  gpsZones=(data||[]).filter(function(r){return r.type==='zone'});
  gpsTriggers=(data||[]).filter(function(r){return r.type==='trigger'});
}

// Trigger zone picker: copies zone coords into trigger
function trigPickZone(trigIdx,zoneId,which){
  if(!zoneId){
    if(which==='end'){
      gpsTriggers[trigIdx].end_lat=null;gpsTriggers[trigIdx].end_lng=null;
      gpsTriggers[trigIdx].end_radius=null;gpsTriggers[trigIdx].end_name=null;
    }
    saveGpsLoc(gpsTriggers[trigIdx]);renderPage();return;
  }
  var z=gpsZones.find(function(x){return x.id===zoneId});
  if(!z)return;
  if(which==='start'){
    gpsTriggers[trigIdx].lat=z.lat;gpsTriggers[trigIdx].lng=z.lng;
    gpsTriggers[trigIdx].radius=z.radius;
  }else{
    gpsTriggers[trigIdx].end_lat=z.lat;gpsTriggers[trigIdx].end_lng=z.lng;
    gpsTriggers[trigIdx].end_radius=z.radius;gpsTriggers[trigIdx].end_name=z.name;
  }
  saveGpsLoc(gpsTriggers[trigIdx]);renderPage();
}

// Add new trigger using first zone's coords as default
function addNewTrigger(){
  var defZone=gpsZones[0]||{lat:gpsLat||35.7,lng:gpsLng||139.9,radius:300};
  saveGpsLoc({name:'New Trigger',lat:defZone.lat,lng:defZone.lng,radius:defZone.radius,
    type:'trigger',action:'takeover',squad:'Quick Study',start_on:'immediate',
    time_from:null,time_to:null,days:['weekday'],cooldown_min:1440,enabled:true,
    sort_order:10+gpsTriggers.length}).then(function(){return reloadGpsLocs()}).then(renderPage);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sSn(s){return s.replace(/'/g,"\\'")}
function isWeekend(){var d=new Date().getDay();return d===0||d===6}

function renderDayTimeline(plan){
  var h='<div class="tl-wrap" style="margin-top:12px">';
  // Hours header 5-23
  h+='<div class="tl-header"><div class="tl-label-col" style="min-width:60px"></div><div class="tl-hours">';
  for(var i=5;i<=23;i++)h+='<div class="tl-hour'+(i===new Date().getHours()?' now':'')+'">'+String(i).padStart(2,'0')+'</div>';
  h+='</div></div>';

  // Base row
  var baseSq=findSq(plan.base);
  var baseCls=baseSq?(baseSq.type==='attacker'?'atk':baseSq.type==='midfielder'?'mid':'def'):'atk';
  h+='<div class="tl-row"><div class="tl-row-label" style="min-width:60px"><span style="font-size:9px;font-weight:700">BASE</span></div><div class="tl-track">';
  if(plan.base){
    h+='<div class="tl-bar '+baseCls+'" style="left:0%;width:100%;opacity:.25;font-size:8px">'+(baseSq?baseSq.ico:'')+' '+plan.base+' (all day)</div>';
  }
  // Overlay interrupts on the base
  (plan.interrupts||[]).forEach(function(intr){
    var parts=intr.time.split(':');var hr=parseInt(parts[0]),mn=parseInt(parts[1]||0);
    var startPct=((hr-5+mn/60)/18)*100;
    var widthPct=Math.max((intr.duration/60/18)*100,2);
    var sq=findSq(intr.squad);
    var cls=sq?(sq.type==='attacker'?'atk':sq.type==='midfielder'?'mid':'def'):'mid';
    h+='<div class="tl-bar '+cls+'" style="left:'+startPct+'%;width:'+widthPct+'%;font-size:7px;z-index:2" title="'+intr.squad+' at '+intr.time+' ('+intr.duration+'min)">'+(sq?sq.ico:'')+' '+String(hr).padStart(2,'0')+':'+String(mn).padStart(2,'0')+'</div>';
  });
  // Now line
  var nowH=new Date().getHours(),nowM=new Date().getMinutes();
  if(nowH>=5&&nowH<=23)h+='<div class="tl-now" style="left:'+((nowH-5+nowM/60)/18*100)+'%"></div>';
  h+='</div></div>';

  // Interrupt rows (one per unique squad in interrupts)
  var usedSquads={};
  (plan.interrupts||[]).forEach(function(intr){
    if(usedSquads[intr.squad])return;usedSquads[intr.squad]=true;
    var sq=findSq(intr.squad);
    var cls=sq?(sq.type==='attacker'?'atk':sq.type==='midfielder'?'mid':'def'):'mid';
    h+='<div class="tl-row"><div class="tl-row-label" style="min-width:60px"><span style="font-size:10px">'+(sq?sq.ico:'')+'</span><span style="font-size:8px">'+intr.squad+'</span></div><div class="tl-track">';
    (plan.interrupts||[]).filter(function(x){return x.squad===intr.squad}).forEach(function(x){
      var pts=x.time.split(':');var xhr=parseInt(pts[0]),xmn=parseInt(pts[1]||0);
      var sp=((xhr-5+xmn/60)/18)*100;var wp=Math.max((x.duration/60/18)*100,2);
      h+='<div class="tl-bar '+cls+'" style="left:'+sp+'%;width:'+wp+'%;font-size:7px" title="'+x.duration+'min '+(x.hardLock?'HARD':'soft')+'">'+String(xhr).padStart(2,'0')+':'+String(xmn).padStart(2,'0')+'</div>';
    });
    if(nowH>=5&&nowH<=23)h+='<div class="tl-now" style="left:'+((nowH-5+nowM/60)/18*100)+'%"></div>';
    h+='</div></div>';
  });

  h+='</div>';

  // Summary stats
  var totalInt=(plan.interrupts||[]).reduce(function(s,x){return s+x.duration},0);
  var hardCount=(plan.interrupts||[]).filter(function(x){return x.hardLock}).length;
  var baseHrs=Math.max(0,Math.round((18*60-totalInt)/60*10)/10);
  h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px">';
  h+='<div style="background:var(--card);border:1px solid var(--amberBd);border-radius:8px;padding:8px 14px;flex:1;min-width:100px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--amber)">'+baseHrs+'h</div><div style="font-size:9px;color:var(--text2)">Base activity time</div></div>';
  h+='<div style="background:var(--card);border:1px solid var(--amberBd);border-radius:8px;padding:8px 14px;flex:1;min-width:100px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--red)">'+totalInt+'min</div><div style="font-size:9px;color:var(--text2)">Total interrupt time</div></div>';
  h+='<div style="background:var(--card);border:1px solid var(--amberBd);border-radius:8px;padding:8px 14px;flex:1;min-width:100px;text-align:center"><div style="font-size:18px;font-weight:700">'+hardCount+'</div><div style="font-size:9px;color:var(--text2)">Hard locks</div></div>';
  h+='</div>';

  return h;
}

function renderTimeline(){

  var h='<div class="tl-wrap"><div class="tl-header"><div class="tl-label-col">SQUAD</div><div class="tl-hours">';
  for(var i=5;i<=23;i++)h+='<div class="tl-hour'+(i===nowH?' now':'')+'">'+String(i).padStart(2,'0')+'</div>';
  h+='</div></div>';
  SQUADS.forEach(function(sq){
    var cfg=takeoverConfig[sq.name],cls=sq.type==='attacker'?'atk':sq.type==='midfielder'?'mid':'def';
    h+='<div class="tl-row"><div class="tl-row-label"><span style="font-size:13px">'+sq.ico+'</span><span style="flex:1;font-size:9px">'+sq.name+'</span><span class="type '+cls+'">'+cls.toUpperCase()+'</span></div><div class="tl-track">';

      var hasSplit=cfg.weekdayOverride||cfg.weekendOverride;
      if(hasSplit){
        var wdOv=cfg.weekdayOverride||{},weOv=cfg.weekendOverride||{};

// ===== CLASH DETECTION =====
function findClashes(){
  var active=Object.entries(takeoverConfig).filter(function(e){return e[1].enabled});
  var cl=[];
  for(var i=0;i<active.length;i++)for(var j=i+1;j<active.length;j++){
    var nA=active[i][0],cA=active[i][1],nB=active[j][0],cB=active[j][1];
    var sA=cA.timeFrom,eA=sA+(cA.timerMin||15)/60,sB=cB.timeFrom,eB=sB+(cB.timerMin||15)/60;
    if(sA<eB&&sB<eA){
      var shD=(cA.days||[]).filter(function(d){return(cB.days||[]).includes(d)});
      var shL=(cA.loc||[]).filter(function(l){return(cB.loc||[]).includes(l)});
      if(shD.length&&shL.length)cl.push({a:nA,b:nB,time:Math.max(sA,sB),days:shD,locs:shL});
    }
  }
  return cl;
}
function resolveClash(a,b){
  var pa=clashPriorities[a]||1,pb=clashPriorities[b]||1,reasons=[];
  if(clashRules.streakProtection&&clashRules.streakProtection.enabled){
    if(((streakData[a]||{}).streak||0)>=3){pa++;reasons.push(a+' streak +1')}
    if(((streakData[b]||{}).streak||0)>=3){pb++;reasons.push(b+' streak +1')}
  }
  reasons.push('Tier: '+a+'='+pa+', '+b+'='+pb);
  var w=pa>=pb?a:b;return{winner:w,loser:w===a?b:a,pa:pa,pb:pb,reasons:reasons};
}

  h+='<div class="mgr-card"><div class="mgr-card-hd">🔒 Blocker Screen Links</div><div class="mgr-card-sub">Links on morning/evening lock screens</div>';
  ofcBlLinks.forEach(function(l,i){
    h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px"><input class="mgr-inp" style="width:28px;text-align:center;font-size:13px" value="'+esc(l.ico)+'" onchange="ofcBlLinks['+i+'].ico=this.value;saveMem(\'cf_ofc_bl_links\',ofcBlLinks)"><input class="mgr-inp" style="flex:1" value="'+esc(l.name)+'" onchange="ofcBlLinks['+i+'].name=this.value;saveMem(\'cf_ofc_bl_links\',ofcBlLinks)"><span style="font-size:8px;color:'+(l.screen==='morning'?'var(--amber)':'var(--blue)')+'">'+l.screen+'</span><button class="mgr-btn mgr-btn-danger" style="padding:2px 6px;font-size:8px" onclick="ofcBlLinks.splice('+i+',1);saveMem(\'cf_ofc_bl_links\',ofcBlLinks);renderPage()">✕</button></div>';
  });
  h+='<div style="display:flex;gap:4px;margin-top:6px"><button class="mgr-btn mgr-btn-ghost" onclick="ofcBlLinks.push({id:\'bl_\'+Date.now(),ico:\'🔗\',name:\'New\',url:\'\',screen:\'morning\'});saveMem(\'cf_ofc_bl_links\',ofcBlLinks);renderPage()">+ Morning</button><button class="mgr-btn mgr-btn-ghost" onclick="ofcBlLinks.push({id:\'bl_\'+Date.now(),ico:\'🔗\',name:\'New\',url:\'\',screen:\'evening\'});saveMem(\'cf_ofc_bl_links\',ofcBlLinks);renderPage()">+ Evening</button></div></div>';
  // Screensaver
  h+='<div class="mgr-card"><div class="mgr-card-hd">✨ Screensaver</div>';
  h+='<div class="mgr-row"><span class="mgr-label">Idle timeout</span><input class="mgr-inp" type="number" min="1" max="120" value="'+ssTimeoutMin+'" style="width:50px" onchange="ssTimeoutMin=parseInt(this.value)||15;saveMem(\'cf_screensaver\',{messages:ssMessages,timeout:ssTimeoutMin})"><span style="font-size:9px;color:var(--text2)">min</span></div>';
  h+='<div style="font-size:9px;color:var(--text2);margin-bottom:4px">Messages:</div>';
  ssMessages.forEach(function(m,i){
    h+='<div style="display:flex;gap:4px;margin-bottom:3px"><input class="mgr-inp" style="flex:1" value="'+esc(m)+'" onchange="ssMessages['+i+']=this.value;saveMem(\'cf_screensaver\',{messages:ssMessages,timeout:ssTimeoutMin})"><button class="mgr-btn mgr-btn-danger" style="padding:2px 6px;font-size:8px" onclick="ssMessages.splice('+i+',1);saveMem(\'cf_screensaver\',{messages:ssMessages,timeout:ssTimeoutMin});renderPage()">✕</button></div>';
  });
  h+='<button class="mgr-btn mgr-btn-ghost" style="width:100%;margin-top:4px" onclick="ssMessages.push(\'New message\');saveMem(\'cf_screensaver\',{messages:ssMessages,timeout:ssTimeoutMin});renderPage()">+ Message</button></div>';
  // Expense triggers
  h+='<div class="mgr-card"><div class="mgr-card-hd">💰 Smart Expense Triggers</div><div class="mgr-card-sub">Time + GPS triggers for expense logging popups</div>';
  h+='<div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:4px">⏰ Time triggers</div>';
  (costTriggerCfg.timeTriggers||[]).forEach(function(t,i){
    h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:3px"><button class="mgr-toggle '+(t.enabled?'on':'')+'" style="font-size:8px;padding:2px 6px" onclick="costTriggerCfg.timeTriggers['+i+'].enabled=!costTriggerCfg.timeTriggers['+i+'].enabled;saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">'+(t.enabled?'ON':'OFF')+'</button><input class="mgr-inp" style="width:60px" value="'+esc(t.label)+'" onchange="costTriggerCfg.timeTriggers['+i+'].label=this.value;saveMem(\'cf_cost_triggers\',costTriggerCfg)"><select class="mgr-sel" onchange="costTriggerCfg.timeTriggers['+i+'].hour=parseInt(this.value);saveMem(\'cf_cost_triggers\',costTriggerCfg)">';
    for(var hh=5;hh<=23;hh++)h+='<option value="'+hh+'" '+(t.hour===hh?'selected':'')+'>'+String(hh).padStart(2,'0')+'</option>';
    h+='</select><button class="mgr-btn mgr-btn-danger" style="padding:2px 6px;font-size:8px" onclick="costTriggerCfg.timeTriggers.splice('+i+',1);saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">✕</button></div>';
  });
  h+='<button class="mgr-btn mgr-btn-ghost" style="margin-top:4px" onclick="costTriggerCfg.timeTriggers.push({id:\'t\'+Date.now(),label:\'Custom\',hour:8,enabled:true});saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">+ Time trigger</button>';
  h+='<div style="font-size:10px;font-weight:600;color:var(--text2);margin:10px 0 4px">📍 GPS shops</div>';
  (costTriggerCfg.gpsShops||[]).forEach(function(s,i){
    h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:3px"><button class="mgr-toggle '+(s.enabled?'on':'')+'" style="font-size:8px;padding:2px 6px" onclick="costTriggerCfg.gpsShops['+i+'].enabled=!costTriggerCfg.gpsShops['+i+'].enabled;saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">'+(s.enabled?'ON':'OFF')+'</button><input class="mgr-inp" style="flex:1" value="'+esc(s.name)+'" onchange="costTriggerCfg.gpsShops['+i+'].name=this.value;saveMem(\'cf_cost_triggers\',costTriggerCfg)"><span style="font-size:8px;color:var(--text3)">'+s.radius+'m</span><button class="mgr-btn mgr-btn-danger" style="padding:2px 6px;font-size:8px" onclick="costTriggerCfg.gpsShops.splice('+i+',1);saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">✕</button></div>';
  });
  h+='<button class="mgr-btn mgr-btn-ghost" style="margin-top:4px" onclick="costTriggerCfg.gpsShops.push({name:\'New Shop\',lat:'+(gpsLat||35.7089)+',lng:'+(gpsLng||139.9454)+',radius:80,enabled:true});saveMem(\'cf_cost_triggers\',costTriggerCfg);renderPage()">+ GPS shop</button>';
  h+='</div>';
  return h;
}

// ===== PAGE: COMMUTE =====
function pgCommute(){
  var h='<div class="page-hdr"><div class="page-title">🚃 Commute & GPS</div><div class="page-sub">Zones set your location. Triggers fire actions when you enter a radius.</div></div>';

  // GPS Status
  h+='<div class="mgr-card"><div class="mgr-card-hd">📡 GPS Status</div>';
  if(gpsLat){
    h+='<div style="padding:8px;background:rgba(56,161,105,.1);border:1px solid rgba(56,161,105,.2);border-radius:8px;font-size:11px;margin-bottom:8px"><span class="dot dot-g"></span> GPS active — ±'+gpsAccuracy+'m<br><span style="font-size:9px;color:var(--text2)">'+gpsLat.toFixed(6)+', '+gpsLng.toFixed(6)+'</span></div>';
  }else{
    h+='<div style="padding:8px;background:var(--card2);border-radius:8px;font-size:11px;color:var(--text3);margin-bottom:8px"><span class="dot dot-r"></span> No GPS data — tap Refresh</div>';
  }
  h+='<div class="mgr-row"><span class="mgr-label">Auto-switch</span><button class="mgr-toggle '+(gpsAutoLoc?'on':'')+'" onclick="gpsAutoLoc=!gpsAutoLoc;renderPage()">'+(gpsAutoLoc?'ON':'OFF')+'</button><button class="mgr-btn mgr-btn-primary" style="margin-left:8px" onclick="navigator.geolocation&&navigator.geolocation.getCurrentPosition(function(p){gpsLat=p.coords.latitude;gpsLng=p.coords.longitude;gpsAccuracy=Math.round(p.coords.accuracy);renderPage()})">📡 Refresh</button></div></div>';

  // ===== ZONES =====
  h+='<div class="mgr-card"><div class="mgr-card-hd">🗺️ Zones <span style="font-size:9px;color:var(--text3);font-weight:400">— set app location state</span></div>';
  h+='<div class="mgr-card-sub">When GPS detects you inside a zone\'s radius, the app switches to that location (home/office/outside). Smallest radius wins if zones overlap.</div>';

  gpsZones.forEach(function(z,i){
    var dist='';
    if(gpsLat){
      var R=6371000,dLat=(z.lat-gpsLat)*Math.PI/180,dLon=(z.lng-gpsLng)*Math.PI/180;
      var a=Math.sin(dLat/2)**2+Math.cos(gpsLat*Math.PI/180)*Math.cos(z.lat*Math.PI/180)*Math.sin(dLon/2)**2;
      var d=Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
      var inside=d<=z.radius;
      dist='<span style="font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;'+(inside?'background:rgba(56,161,105,.15);color:var(--green)':'background:var(--card2);color:var(--text3)')+'">'+d+'m '+(inside?'● INSIDE':'away')+'</span>';
    }

    h+='<div style="background:var(--bg);border:1px solid var(--amberBd);border-radius:8px;padding:10px;margin-bottom:6px;opacity:'+(z.enabled?'1':'.5')+'">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:14px">'+(z.loc_state==='home'?'🏠':z.loc_state==='office'?'🏢':'🌳')+'</span><input class="mgr-inp" style="flex:1;font-size:12px;font-weight:700" value="'+esc(z.name)+'" onchange="gpsZones['+i+'].name=this.value;saveGpsLoc(gpsZones['+i+'])">'+dist+'</div>';

    h+='<div class="mgr-row"><span class="mgr-label">Lat / Lng</span><input class="mgr-inp" type="number" step="0.0001" style="width:90px" value="'+z.lat+'" onchange="gpsZones['+i+'].lat=parseFloat(this.value);saveGpsLoc(gpsZones['+i+']);renderPage()"><input class="mgr-inp" type="number" step="0.0001" style="width:90px;margin-left:4px" value="'+z.lng+'" onchange="gpsZones['+i+'].lng=parseFloat(this.value);saveGpsLoc(gpsZones['+i+']);renderPage()"></div>';

    h+='<div class="mgr-row"><span class="mgr-label">Radius</span><select class="mgr-sel" onchange="gpsZones['+i+'].radius=parseInt(this.value);saveGpsLoc(gpsZones['+i+']);renderPage()">';
    [100,200,300,500,750,1000].forEach(function(r){h+='<option value="'+r+'" '+(z.radius===r?'selected':'')+'>'+r+'m</option>'});
    h+='</select><span class="mgr-label" style="margin-left:12px">Sets loc</span><select class="mgr-sel" onchange="gpsZones['+i+'].loc_state=this.value;saveGpsLoc(gpsZones['+i+'])">';
    ['home','office','outside'].forEach(function(s){h+='<option value="'+s+'" '+(z.loc_state===s?'selected':'')+'>'+s+'</option>'});
    h+='</select></div>';

    h+='<div style="display:flex;gap:4px;margin-top:6px">';
    if(gpsLat)h+='<button class="mgr-btn mgr-btn-primary" style="font-size:9px" onclick="gpsZones['+i+'].lat='+gpsLat+';gpsZones['+i+'].lng='+gpsLng+';saveGpsLoc(gpsZones['+i+']);renderPage()">📍 Pin to GPS</button>';
    h+='<button class="mgr-btn" style="font-size:9px" onclick="gpsZones['+i+'].enabled=!gpsZones['+i+'].enabled;saveGpsLoc(gpsZones['+i+']);renderPage()">'+(z.enabled?'Disable':'Enable')+'</button>';
    h+='<button class="mgr-btn mgr-btn-danger" style="font-size:9px" onclick="if(confirm(\'Delete zone: '+esc(z.name)+'?\')){deleteGpsLoc(gpsZones['+i+'].id).then(function(){return reloadGpsLocs()}).then(renderPage)}">Delete</button>';
    h+='</div></div>';
  });

  h+='<button class="mgr-btn mgr-btn-ghost" style="width:100%;margin-top:6px" onclick="saveGpsLoc({name:\'New Zone\',lat:'+(gpsLat||35.7)+',lng:'+(gpsLng||139.9)+',radius:500,type:\'zone\',loc_state:\'outside\',enabled:true,sort_order:'+gpsZones.length+'}).then(function(){return reloadGpsLocs()}).then(renderPage)">+ Add zone</button>';
  h+='</div>';

  // ===== TRIGGERS =====
  h+='<div class="mgr-card"><div class="mgr-card-hd">⚡ Triggers <span style="font-size:9px;color:var(--text3);font-weight:400">— fire actions when entering radius</span></div>';
  h+='<div class="mgr-card-sub">Triggers fire independently of zones. Each has its own cooldown, time window, and day filter. Actions: takeover (locks app with squad tasks), cost_popup (expense prompt), notification (system alert).</div>';

  // Helper: find zone matching trigger coords
  // Helper: find zone matching trigger coords
  function matchZone(lat,lng){
    var best=null,bestD=Infinity;
    gpsZones.forEach(function(z){
      var R=6371000,dLat=(z.lat-lat)*Math.PI/180,dLon=(z.lng-lng)*Math.PI/180;
      var a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(z.lat*Math.PI/180)*Math.sin(dLon/2)**2;
      var d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      if(d<bestD){bestD=d;best=z}
    });
    return(best&&bestD<100)?best:null; // match if within 100m
  }

  if(!gpsTriggers.length){
    h+='<div style="padding:16px;text-align:center;font-size:11px;color:var(--text3)">No triggers yet — add one below</div>';
  }

  gpsTriggers.forEach(function(t,i){
    var actionIco=t.action==='takeover'?'⚡':t.action==='cost_popup'?'💰':'🔔';
    var startZone=matchZone(t.lat,t.lng);
    var endZone=t.end_lat!=null?matchZone(t.end_lat,t.end_lng):null;

    h+='<div style="background:var(--bg);border:1px solid '+(t.enabled?'var(--amberBd)':'var(--card2)')+';border-radius:8px;padding:10px;margin-bottom:6px;opacity:'+(t.enabled?'1':'.5')+'">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:14px">'+actionIco+'</span><input class="mgr-inp" style="flex:1;font-size:12px;font-weight:700" value="'+esc(t.name)+'" onchange="gpsTriggers['+i+'].name=this.value;saveGpsLoc(gpsTriggers['+i+'])"></div>';

    // Start zone dropdown
    h+='<div class="mgr-row"><span class="mgr-label">Start zone</span><select class="mgr-sel" style="flex:1" onchange="trigPickZone('+i+',this.value,\'start\')">';
    h+='<option value="">— select zone —</option>';
    gpsZones.forEach(function(z){
      var sel=startZone&&startZone.id===z.id;
      h+='<option value="'+z.id+'" '+(sel?'selected':'')+'>'+esc(z.name)+'</option>';
    });
    h+='</select></div>';

    // Action + Squad
    h+='<div class="mgr-row"><span class="mgr-label">Action</span><select class="mgr-sel" onchange="gpsTriggers['+i+'].action=this.value;saveGpsLoc(gpsTriggers['+i+']);renderPage()">';
    ['takeover','cost_popup','notification'].forEach(function(a){h+='<option value="'+a+'" '+(t.action===a?'selected':'')+'>'+a+'</option>'});
    h+='</select>';
    if(t.action==='takeover'){
      h+='<span class="mgr-label" style="margin-left:8px">Squad</span><input class="mgr-inp" style="flex:1" value="'+esc(t.squad||'')+'" onchange="gpsTriggers['+i+'].squad=this.value;saveGpsLoc(gpsTriggers['+i+'])" placeholder="e.g. Quick Study">';
    }
    h+='</div>';

    // Start mode
    h+='<div class="mgr-row"><span class="mgr-label">Start</span><select class="mgr-sel" onchange="gpsTriggers['+i+'].start_on=this.value;saveGpsLoc(gpsTriggers['+i+'])">';
    [{v:'immediate',l:'⚡ Immediate'},{v:'app_open',l:'📱 App open (2m grace)'},{v:'manual',l:'👆 Manual (tap to start)'}].forEach(function(o){h+='<option value="'+o.v+'" '+(t.start_on===o.v?'selected':'')+'>'+o.l+'</option>'});
    h+='</select></div>';

    // End zone dropdown (for takeover only)
    if(t.action==='takeover'){
      h+='<div class="mgr-row"><span class="mgr-label">End zone</span><select class="mgr-sel" style="flex:1" onchange="trigPickZone('+i+',this.value,\'end\')">';
      h+='<option value="">— none (timer-based) —</option>';
      gpsZones.forEach(function(z){
        var sel=endZone&&endZone.id===z.id;
        h+='<option value="'+z.id+'" '+(sel?'selected':'')+'>'+esc(z.name)+'</option>';
      });
      h+='</select>';
      if(t.end_lat!=null)h+='<span style="font-size:9px;color:var(--green);margin-left:8px">● auto-ends here</span>';
      h+='</div>';
    }

    // Time window
    h+='<div class="mgr-row"><span class="mgr-label">Window</span><input class="mgr-inp" type="number" step="0.5" min="0" max="24" style="width:50px" value="'+(t.time_from!=null?t.time_from:'')+'" onchange="gpsTriggers['+i+'].time_from=this.value?parseFloat(this.value):null;saveGpsLoc(gpsTriggers['+i+'])" placeholder="from"><span style="font-size:10px;color:var(--text3);margin:0 4px">→</span><input class="mgr-inp" type="number" step="0.5" min="0" max="24" style="width:50px" value="'+(t.time_to!=null?t.time_to:'')+'" onchange="gpsTriggers['+i+'].time_to=this.value?parseFloat(this.value):null;saveGpsLoc(gpsTriggers['+i+'])" placeholder="to"><span style="font-size:9px;color:var(--text3);margin-left:6px">'+(t.time_from!=null&&t.time_to!=null?String(Math.floor(t.time_from)).padStart(2,'0')+':'+String(Math.round((t.time_from%1)*60)).padStart(2,'0')+' — '+String(Math.floor(t.time_to)).padStart(2,'0')+':'+String(Math.round((t.time_to%1)*60)).padStart(2,'0'):'any time')+'</span></div>';

    // Days
    h+='<div class="mgr-row"><span class="mgr-label">Days</span>';
    var trigDays=t.days||[];
    ['weekday','weekend','holiday'].forEach(function(d){
      var on=trigDays.includes(d);
      h+='<button style="border:1px solid '+(on?'var(--accent)':'var(--card2)')+';background:'+(on?'rgba(99,102,241,.1)':'var(--bg)')+';color:'+(on?'var(--accent)':'var(--text3)')+';border-radius:6px;padding:2px 8px;font-size:9px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;margin-right:4px" onclick="var d=gpsTriggers['+i+'].days||[];var idx=d.indexOf(\''+d+'\');if(idx>=0)d.splice(idx,1);else d.push(\''+d+'\');gpsTriggers['+i+'].days=d;saveGpsLoc(gpsTriggers['+i+']);renderPage()">'+d+'</button>';
    });
    h+='</div>';

    // Cooldown
    h+='<div class="mgr-row"><span class="mgr-label">Cooldown</span><select class="mgr-sel" onchange="gpsTriggers['+i+'].cooldown_min=parseInt(this.value);saveGpsLoc(gpsTriggers['+i+'])">';
    [{v:60,l:'1 hour'},{v:120,l:'2 hours'},{v:240,l:'4 hours'},{v:480,l:'8 hours'},{v:1440,l:'24 hours'}].forEach(function(o){h+='<option value="'+o.v+'" '+((t.cooldown_min||60)===o.v?'selected':'')+'>'+o.l+'</option>'});
    h+='</select></div>';

    // Actions row
    h+='<div style="display:flex;gap:4px;margin-top:6px">';
    h+='<button class="mgr-btn" style="font-size:9px" onclick="gpsTriggers['+i+'].enabled=!gpsTriggers['+i+'].enabled;saveGpsLoc(gpsTriggers['+i+']);renderPage()">'+(t.enabled?'Disable':'Enable')+'</button>';
    h+='<button class="mgr-btn mgr-btn-danger" style="font-size:9px" onclick="if(confirm(\'Delete trigger: '+esc(t.name)+'?\')){deleteGpsLoc(gpsTriggers['+i+'].id).then(function(){return reloadGpsLocs()}).then(renderPage)}">Delete</button>';
    h+='</div></div>';
  });

  h+='<button class="mgr-btn mgr-btn-ghost" style="width:100%;margin-top:6px" onclick="addNewTrigger()">+ Add trigger</button>';
  h+='</div>';

  return h;
}

// ===== BOOT =====
init();
</script>
